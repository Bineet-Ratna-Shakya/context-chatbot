services:
  chatbot:
    build: .
    image: context-chatbot:latest
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required}
      ANSWER_MODEL: ${ANSWER_MODEL:-llama-3.3-70b-versatile}
      FAST_MODEL: ${FAST_MODEL:-llama-3.1-8b-instant}
      RETRIEVAL_K: ${RETRIEVAL_K:-4}
      RETRIEVAL_MAX_DISTANCE: ${RETRIEVAL_MAX_DISTANCE:-1.2}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    restart: unless-stopped
